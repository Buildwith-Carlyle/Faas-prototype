<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FaaS ROI">

    <title>ROI Calculator | FaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { apple: { bg: '#f5f5f7', darkBg: '#0a0a0c', card: '#ffffff', darkCard: '#1c1c1e', border: '#e5e7eb', darkBorder: '#38383a' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(147, 51, 234, 0.05), transparent 40%);
        }
        .dark body {
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(147, 51, 234, 0.02), transparent 40%);
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        * { transition-property: background-color, border-color, color; transition-duration: 300ms; transition-timing-function: ease-in-out; }
    </style>

    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
    </script>
</head>
<body class="min-h-screen bg-apple-bg dark:bg-apple-darkBg text-gray-900 dark:text-white antialiased flex flex-col pb-12">

    <header class="h-20 flex items-center justify-between px-6 md:px-10 w-full mb-4 md:mb-8 border-b border-apple-border dark:border-white/5 bg-apple-card/80 dark:bg-apple-darkCard/80 backdrop-blur-md sticky top-0 z-50">
        <a href="dashboard.html" class="text-gray-500 hover:text-gray-900 dark:hover:text-white transition-colors text-sm font-medium">
            &larr; Back to Dashboard
        </a>
        <div class="flex items-center gap-4">
            <span class="text-xs font-bold uppercase tracking-widest text-gray-500 hidden sm:inline-block">ROI Simulator</span>
            
            <button onclick="toggleTheme()" class="relative inline-flex h-6 w-11 items-center rounded-full bg-gray-300 dark:bg-gray-700 transition-colors duration-300 focus:outline-none shadow-inner">
                <span class="inline-block h-4 w-4 transform rounded-full bg-white dark:bg-gray-400 shadow transition-transform duration-300 translate-x-1 dark:translate-x-6"></span>
            </button>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 md:px-0">
        <div class="w-full max-w-4xl bg-white/70 dark:bg-apple-darkCard/80 backdrop-blur-2xl rounded-[32px] shadow-[0_8px_40px_rgba(0,0,0,0.04)] dark:shadow-2xl border border-white dark:border-white/5 overflow-hidden relative">
            
            <div class="absolute -top-20 -right-20 w-64 h-64 bg-blue-400/10 dark:bg-blue-600/10 rounded-full blur-3xl pointer-events-none"></div>

            <div class="p-6 md:p-14">
                <div class="text-center mb-8 md:mb-10">
                    <h1 class="text-3xl md:text-4xl font-bold tracking-tight mb-3 text-gray-900 dark:text-white">Calculate Your ROI</h1>
                    <p class="text-gray-500 dark:text-gray-400 font-medium text-sm md:text-base">See how much upfront capital you unlock by switching to FaaS.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs md:text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Number of Properties / Rooms</label>
                            <div class="relative">
                                <input type="number" id="rooms" value="15" class="w-full bg-[#f5f5f7] dark:bg-black border-2 border-transparent dark:border-white/5 rounded-2xl px-5 py-4 text-lg font-medium text-gray-900 dark:text-white focus:bg-white dark:focus:bg-[#121214] focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs md:text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Traditional Setup Cost per Room</label>
                            <div class="relative">
                                <span class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 font-medium text-lg">£</span>
                                <input type="number" id="capex" value="2500" class="w-full bg-[#f5f5f7] dark:bg-black border-2 border-transparent dark:border-white/5 rounded-2xl pl-10 pr-5 py-4 text-lg font-medium text-gray-900 dark:text-white focus:bg-white dark:focus:bg-[#121214] focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs md:text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">FaaS Subscription per Room (Monthly)</label>
                            <div class="relative">
                                <span class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 font-medium text-lg">£</span>
                                <input type="number" id="opex" value="140" readonly class="w-full bg-gray-100 dark:bg-white/5 border-2 border-transparent dark:border-transparent rounded-2xl pl-10 pr-5 py-4 text-lg font-medium text-gray-500 dark:text-gray-500 cursor-not-allowed">
                            </div>
                        </div>
                    </div>

                    <div class="bg-gray-900 rounded-[24px] p-6 md:p-8 text-white shadow-xl flex flex-col justify-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 right-0 h-1/2 bg-gradient-to-b from-white/10 to-transparent pointer-events-none"></div>

                        <div class="mb-8 relative z-10">
                            <p class="text-gray-400 text-xs md:text-sm font-medium mb-1 uppercase tracking-wider">Upfront Cash Saved (CapEx)</p>
                            <h2 class="text-4xl md:text-5xl font-bold tracking-tight text-white mb-2" id="savedCash">£37,500</h2>
                            <p class="text-green-400 text-xs md:text-sm font-medium">Keep this in your bank account today.</p>
                        </div>

                        <div class="space-y-4 relative z-10">
                            <div class="flex justify-between items-center pb-4 border-b border-gray-700/50">
                                <span class="text-gray-400 text-xs md:text-sm">New Monthly Cost (OpEx)</span>
                                <span class="font-semibold text-base md:text-lg" id="monthlyCost">£2,100</span>
                            </div>
                            <div class="flex justify-between items-center pb-4 border-b border-gray-700/50">
                                <span class="text-gray-400 text-xs md:text-sm">Tax Deductible</span>
                                <span class="font-semibold text-green-400 text-sm md:text-base">100% (Year 1)</span>
                            </div>
                        </div>

                        <button onclick="alert('Demo: Redirecting to Lead Capture Form...')" class="mt-6 md:mt-8 w-full bg-blue-600 hover:bg-blue-500 text-white rounded-xl py-3.5 md:py-4 font-semibold text-sm md:text-base transition-colors shadow-lg active:scale-95">
                            Join VIP Pilot Waitlist
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        function calculateROI() {
            // Grab the raw text from the input boxes
            const rawRooms = document.getElementById('rooms').value;
            const rawCapex = document.getElementById('capex').value;
            
            // Force the text into hard Math integers (defaults to 0 if blank)
            const rooms = parseInt(rawRooms) || 0;
            const capex = parseInt(rawCapex) || 0;
            const opex = 140; // Fixed FaaS Tier

            // Run the Math
            const savedCash = rooms * capex;
            const monthlyCost = rooms * opex;

            // Format with commas and push to the screen
            document.getElementById('savedCash').innerText = '£' + savedCash.toLocaleString('en-GB');
            document.getElementById('monthlyCost').innerText = '£' + monthlyCost.toLocaleString('en-GB');
        }
        
        // Listen to the inputs actively
        document.getElementById('rooms').addEventListener('input', calculateROI);
        document.getElementById('capex').addEventListener('input', calculateROI);

        // Run once immediately so the starting £37,500 is accurate
        calculateROI();
    </script>
</body>
</html>

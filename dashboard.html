<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Landlord Dashboard | FaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { apple: { bg: '#f5f5f7', darkBg: '#000000', card: '#ffffff', darkCard: '#1c1c1e', border: '#e5e7eb', darkBorder: '#38383a' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        * { transition-property: background-color, border-color, color; transition-duration: 300ms; transition-timing-function: ease-in-out; }
        
        /* Modal Transitions */
        .modal-content { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-hidden { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-hidden .modal-content { transform: scale(0.95) translateY(10px); }
        .modal-visible { opacity: 1; pointer-events: auto; transition: opacity 0.3s ease; }
        .modal-visible .modal-content { transform: scale(1) translateY(0); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script>
        // Tab Switching Logic (SPA Architecture)
        function switchTab(tabId, event) {
            if (event) event.preventDefault();
            
            // Hide all tabs
            document.getElementById('tab-overview').classList.add('hidden');
            document.getElementById('tab-properties').classList.add('hidden');
            document.getElementById('tab-roi').classList.add('hidden');
            
            // Show selected tab
            document.getElementById(tabId).classList.remove('hidden');
            
            // Reset Sidebar Styles
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                link.className = 'nav-link block px-4 py-2.5 text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-white/5 rounded-xl text-sm font-medium transition-colors';
            });
            
            // Highlight Active Sidebar Link
            const activeLink = document.getElementById('nav-' + tabId);
            if(activeLink) {
                activeLink.className = 'nav-link block px-4 py-2.5 bg-gray-100 dark:bg-white/10 rounded-xl text-sm font-medium border border-gray-200 dark:border-white/5 text-blue-600 dark:text-blue-400';
            }
            
            // Auto-close sidebar on mobile
            if(window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('sidebarOverlay').classList.add('hidden');
            }
        }

        function toggleModal(id) {
            const modal = document.getElementById(id);
            if (modal.classList.contains('modal-hidden')) { 
                modal.classList.remove('modal-hidden'); 
                modal.classList.add('modal-visible'); 
            } else { 
                modal.classList.remove('modal-visible'); 
                modal.classList.add('modal-hidden'); 
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            document.getElementById('themeIcon').innerHTML = html.classList.contains('dark') ? '☀️' : '🌙';
            document.getElementById('themeText').innerText = html.classList.contains('dark') ? 'Light Mode' : 'Dark Mode';
        }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }
        function submitOrder(event) { 
            event.preventDefault(); 
            alert("Deployment Confirmed. Logistics team notified."); 
            toggleModal('orderModal'); 
        }
    </script>
</head>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden backdrop-blur-sm transition-opacity" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed md:relative inset-y-0 left-0 w-64 transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-30 bg-apple-card dark:bg-apple-darkCard border-r border-apple-border dark:border-apple-darkBorder flex flex-col h-full shadow-2xl md:shadow-none">
        <div class="h-20 flex items-center justify-between px-8">
            <div class="font-semibold text-xl tracking-tight text-black dark:text-white">
                FaaS <span class="text-gray-400 font-light ml-1">Portal</span>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-gray-500 hover:text-gray-900 dark:hover:text-white focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <nav class="flex-1 px-4 py-4 space-y-1 flex flex-col overflow-y-auto no-scrollbar">

                &larr; Exit to Home
            </a>

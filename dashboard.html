<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Landlord Dashboard | FaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { apple: { bg: '#f5f5f7', darkBg: '#000000', card: '#ffffff', darkCard: '#1c1c1e', border: '#e5e7eb', darkBorder: '#38383a' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        * { transition-property: background-color, border-color, color; transition-duration: 300ms; transition-timing-function: ease-in-out; }
        #orderModal { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-hidden { opacity: 0; pointer-events: none; }
        .modal-hidden .modal-content { transform: scale(0.95) translateY(10px); }
        .modal-visible { opacity: 1; pointer-events: auto; }
        .modal-visible .modal-content { transform: scale(1) translateY(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script>
        function toggleModal() {
            const modal = document.getElementById('orderModal');
            if (modal.classList.contains('modal-hidden')) { modal.classList.remove('modal-hidden'); modal.classList.add('modal-visible'); } 
            else { modal.classList.remove('modal-visible'); modal.classList.add('modal-hidden'); }
        }
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            document.getElementById('themeIcon').innerHTML = html.classList.contains('dark') ? '☀️' : '🌙';
            document.getElementById('themeText').innerText = html.classList.contains('dark') ? 'Light Mode' : 'Dark Mode';
        }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }
        function submitOrder(event) { event.preventDefault(); alert("Deployment Confirmed."); toggleModal(); }
    </script>
</head>
<body class="h-screen overflow-hidden flex bg-apple-bg dark:bg-apple-darkBg text-gray-900 dark:text-gray-100 antialiased relative">

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden backdrop-blur-sm transition-opacity" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed md:relative inset-y-0 left-0 w-64 transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-30 bg-apple-card dark:bg-apple-darkCard border-r border-apple-border dark:border-apple-darkBorder flex flex-col h-full shadow-2xl md:shadow-none">
        <div class="h-20 flex items-center justify-between px-8">
            <div class="font-semibold text-xl tracking-tight text-black dark:text-white">
                FaaS <span class="text-gray-400 font-light ml-1">Portal</span>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-gray-500 hover:text-gray-900 dark:hover:text-white focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <nav class="flex-1 px-4 py-4 space-y-1 flex flex-col overflow-y-auto">
            <a href="index.html" class="block px-4 py-2.5 text-gray-500 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/5 rounded-xl text-sm font-medium transition-colors mb-4 border border-transparent hover:border-gray-200 dark:hover:border-white/10">
                &larr; Exit to Home
            </a>
            
            <a href="dashboard.html" class="block px-4 py-2.5 bg-gray-100 dark:bg-white/10 rounded-xl text-sm font-medium border border-gray-200 dark:border-white/5 text-blue-600 dark:text-blue-400">Overview</a>
            <a href="#" class="block px-4 py-2.5 text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-white/5 rounded-xl text-sm font-medium transition-colors">Properties (DPP)</a>
            <a href="#" class="block px-4 py-2.5 text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-white/5 rounded-xl text-sm font-medium transition-colors">💰 ROI Calculator</a>
            
            <div class="mt-auto pt-4 border-t border-apple-border dark:border-apple-darkBorder space-y-2">
                <button onclick="toggleTheme()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-50 dark:hover:bg-white/5 rounded-xl transition-all cursor-pointer bg-transparent border-none outline-none">
                    <span id="themeIcon" class="text-lg">☀️</span>
                    <span id="themeText">Light Mode</span>
                </button>
            </div>
       </nav>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-y-auto w-full overflow-x-hidden">
        <header class="sticky top-0 h-20 bg-apple-bg/80 dark:bg-apple-darkBg/80 backdrop-blur-md flex items-center justify-between px-6 md:px-10 z-10 border-b border-transparent dark:border-white/5 shadow-sm md:shadow-none">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-500 hover:text-gray-900 dark:hover:text-white focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white">Dashboard</h1>
            </div>
            <button onclick="toggleModal()" class="bg-black dark:bg-white text-white dark:text-black px-4 md:px-5 py-2 md:py-2.5 rounded-full text-xs md:text-sm font-medium shadow-sm active:scale-95 transition-all">
                + New Deployment
            </button>
        </header>

        <div class="px-4 md:px-10 pb-10 pt-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-8 md:mb-10">
                <div class="bg-apple-card dark:bg-apple-darkCard p-5 md:p-6 rounded-2xl shadow-sm border border-apple-border dark:border-apple-darkBorder">
                    <div class="text-[10px] md:text-xs font-medium text-gray-400 mb-1 uppercase tracking-wider">Active Rooms</div>
                    <div class="text-2xl md:text-3xl font-semibold">15</div>
                </div>
                <div class="bg-apple-card dark:bg-apple-darkCard p-5 md:p-6 rounded-2xl shadow-sm border border-apple-border dark:border-apple-darkBorder">
                    <div class="text-[10px] md:text-xs font-medium text-gray-400 mb-1 uppercase tracking-wider">Monthly OpEx</div>
                    <div class="text-2xl md:text-3xl font-semibold">£2,700</div>
                </div>
                <div class="bg-apple-card dark:bg-apple-darkCard p-5 md:p-6 rounded-2xl shadow-sm border border-apple-border dark:border-apple-darkBorder">
                    <div class="text-[10px] md:text-xs font-medium text-gray-400 mb-1 uppercase tracking-wider">CapEx Saved</div>
                    <div class="text-2xl md:text-3xl font-semibold text-green-500">£22,500</div>
                </div>
                <div class="bg-apple-card dark:bg-apple-darkCard p-5 md:p-6 rounded-2xl shadow-sm border border-apple-border dark:border-apple-darkBorder">
                    <div class="text-[10px] md:text-xs font-medium text-gray-400 mb-1 uppercase tracking-wider">Carbon Offset</div>
                    <div class="text-2xl md:text-3xl font-semibold text-blue-500">840 kg</div>
                </div>
            </div>
            
            <h2 class="text-base md:text-lg font-semibold mb-3 md:mb-4 px-1">Digital Product Passport</h2>
            <div class="bg-apple-card dark:bg-apple-darkCard rounded-2xl shadow-sm border border-apple-border dark:border-apple-darkBorder overflow-hidden">
                <div class="overflow-x-auto no-scrollbar pb-2">
                    <table class="w-full text-left border-collapse min-w-[600px]">
                        <thead>
                            <tr class="border-b border-apple-border dark:border-apple-darkBorder text-[10px] md:text-xs font-medium text-gray-500 tracking-wider">
                                <th class="px-4 md:px-6 py-3">Asset ID</th>
                                <th class="px-4 md:px-6 py-3">Item</th>
                                <th class="px-4 md:px-6 py-3">Location</th>
                                <th class="px-4 md:px-6 py-3">Status</th>
                            </tr>
                        </thead>
                        <tbody class="text-xs md:text-sm divide-y divide-gray-100 dark:divide-white/5">
                            <tr class="group hover:bg-gray-50 dark:hover:bg-white/5">
                                <td class="px-4 md:px-6 py-4 font-mono text-gray-500 group-hover:text-black dark:group-hover:text-white">DPP-8839-A</td>
                                <td class="px-4 md:px-6 py-4 font-medium">Premium Mattress</td>
                                <td class="px-4 md:px-6 py-4 text-gray-500">Unit 4, Wembley Park</td>
                                <td class="px-4 md:px-6 py-4 text-green-500">Active</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    
    <div id="orderModal" class="modal-hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleModal()"></div>
        <div class="modal-content relative bg-white dark:bg-apple-darkCard border border-white/20 dark:border-white/10 rounded-[24px] shadow-2xl w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-5"><h3 class="text-lg font-semibold">Deploy New Unit</h3><button onclick="toggleModal()" class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800">&times;</button></div>
            <form onsubmit="submitOrder(event)">
                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="toggleModal()" class="px-5 py-2.5 rounded-full text-sm font-medium bg-gray-100 dark:bg-white/10">Cancel</button>
                    <button type="submit" class="px-5 py-2.5 bg-blue-600 text-white rounded-full text-sm font-medium">Confirm</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

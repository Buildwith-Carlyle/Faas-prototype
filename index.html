    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Smooth scrolling and transitions */
        html { scroll-behavior: smooth; }
        * { transition-property: background-color, border-color, color; transition-duration: 300ms; transition-timing-function: ease-in-out; }
        
        /* Floating animation for the UI cards */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-slow { animation: float 6s ease-in-out infinite; }
        .float-fast { animation: float 4s ease-in-out infinite; }
    </style>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const themeIcon = document.getElementById('themeIcon');
            
            // Toggle the 'dark' class
            html.classList.toggle('dark');
            
            // Update the icon
            if (html.classList.contains('dark')) {
                themeIcon.innerHTML = '☀️';
            } else {
                themeIcon.innerHTML = '🌙';
            }
        }
    </script>

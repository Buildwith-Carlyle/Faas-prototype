<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tenant App | FaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { apple: { bg: '#f5f5f7', darkBg: '#000000', card: '#ffffff', darkCard: '#1c1c1e', border: '#e5e7eb', darkBorder: '#38383a' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
</head>
<body class="bg-apple-bg dark:bg-apple-darkBg text-gray-900 dark:text-white antialiased transition-colors duration-300">

    <div class="flex flex-col h-screen max-w-md mx-auto bg-apple-bg dark:bg-apple-darkBg overflow-hidden relative shadow-2xl sm:border-x border-apple-border dark:border-apple-darkBorder">
        
        <header class="px-6 pt-12 pb-4 bg-apple-card/80 dark:bg-apple-darkCard/80 backdrop-blur-xl border-b border-apple-border dark:border-apple-darkBorder sticky top-0 z-50">
            <div class="flex justify-between items-center mb-3">
                <a href="index.html" class="flex items-center gap-1 text-gray-500 hover:text-gray-900 dark:hover:text-white transition-colors p-1 -ml-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    <span class="text-xs font-semibold">Home</span>
                </a>
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-bold tracking-[0.2em] text-blue-500 uppercase">FaaS Direct</span>
                    <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                    
                    <button onclick="toggleTheme()" class="relative inline-flex h-5 w-9 items-center rounded-full bg-gray-300 dark:bg-gray-700 transition-colors duration-300 focus:outline-none shadow-inner ml-2">
                        <span class="inline-block h-3.5 w-3.5 transform rounded-full bg-white dark:bg-gray-400 shadow transition-transform duration-300 translate-x-1 dark:translate-x-4.5" style="--tw-translate-x: 0.2rem;" ></span>
                    </button>
                </div>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Your Furniture</h1>
        </header>

        <main class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-6">
            <div class="bg-gradient-to-br from-blue-600 to-blue-700 rounded-[32px] p-6 text-white shadow-xl">
                <p class="text-blue-100 text-[10px] uppercase font-bold tracking-widest mb-1">Active Rental</p>
                <h2 class="text-2xl font-bold mb-6">3-Seater Sofa</h2>
                <div class="grid grid-cols-2 gap-4 bg-black/10 p-4 rounded-2xl backdrop-blur-md border border-white/5">
                    <div>
                        <p class="text-blue-200 text-[9px] uppercase font-bold">Asset ID</p>
                        <p class="font-mono text-xs">DPP-1142-B</p>
                    </div>
                    <div>
                        <p class="text-blue-200 text-[9px] uppercase font-bold">Location</p>
                        <p class="text-xs">Unit 2, Wembley</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="bg-apple-card dark:bg-apple-darkCard p-5 rounded-[28px] border border-apple-border dark:border-apple-darkBorder flex flex-col items-center gap-3 active:scale-95 transition-all">
                    <span class="text-2xl">⚠️</span><span class="text-xs font-bold uppercase tracking-widest">Report</span>
                </button>
                <button class="bg-apple-card dark:bg-apple-darkCard p-5 rounded-[28px] border border-apple-border dark:border-apple-darkBorder flex flex-col items-center gap-3 active:scale-95 transition-all">
                    <span class="text-2xl">🔄</span><span class="text-xs font-bold uppercase tracking-widest">Swap</span>
                </button>
            </div>
        </main>
    </div>
</body>
</html>
